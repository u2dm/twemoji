name: build-colr-font
on:
  workflow_dispatch:
    inputs:
      release_tag:
        required: true
        default: "colr-v17.0.3"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build font
        run: ./scripts/build-colr.sh

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.event.inputs.release_tag }}" \
            Twemoji.ttf Twemoji.ttf.sha256 \
            --title "${{ github.event.inputs.release_tag }}" \
            --notes "COLRv0 build of this fork's Twemoji SVGs (family \"Twemoji\"). Emoji graphics CC-BY 4.0, see LICENSE-GRAPHICS.md."
